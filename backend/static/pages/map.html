<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Donor Map — RaktSetu</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/leaflet.css"/>
  <style>
    #map { height: 520px; width: 100%; border-radius: 10px; margin-top: 16px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
    .info-bar { background: #fff5f5; border-left: 4px solid #CC0000; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; color: #CC0000; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">🩸 Rakt<span>Setu</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Become Donor</a>
      <a href="emergency.html">Emergency</a>
      <a href="map.html" class="active">Live Map</a>
      <a href="dashboard.html">My Profile</a>
    </nav>
  </div>

  <div class="container">
    <div class="page-title">🗺️ Live Donor Map</div>
    <div class="page-subtitle">All active verified donors near you.</div>

    <div class="controls">
      <div class="form-group" style="margin:0;">
        <label>Filter Blood Group</label>
        <select id="filterBlood" onchange="loadDonors()">
          <option value="">All Groups</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>
      <button class="btn btn-navy" onclick="locateMe()">📍 My Location</button>
      <button class="btn btn-outline" onclick="loadDonors()">🔄 Refresh</button>
    </div>

    <div class="info-bar" id="infoBar">Loading donors...</div>
    <div id="map"></div>
  </div>

  <script src="/static/js/leaflet.js"></script>
  <script>
    // Initialize map — center of India
    const map = L.map("map").setView([20.5937, 78.9629], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    let markers = [];

    async function loadDonors() {
      // Clear old markers
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const bg = document.getElementById("filterBlood").value;
      const url = "http://localhost:5000/api/donors/active" + (bg ? "?blood_group=" + bg : "");

      document.getElementById("infoBar").textContent = "Loading...";

      try {
        const res  = await fetch(url);
        const json = await res.json();

        if (!json.success) {
          document.getElementById("infoBar").textContent = "Error loading donors.";
          return;
        }

        const donors = json.data;
        let count = 0;

        donors.forEach(d => {
          if (!d.latitude || !d.longitude) return;

          const lat = parseFloat(d.latitude);
          const lon = parseFloat(d.longitude);

          const marker = L.circleMarker([lat, lon], {
            radius: 10,
            fillColor: "#CC0000",
            color: "#990000",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
          }).addTo(map);

          marker.bindPopup(`
            <b style="font-size:15px;color:#1F4E79">${d.name}</b><br>
            <span style="background:#CC0000;color:white;padding:2px 8px;border-radius:10px;font-weight:700">${d.blood_group}</span><br><br>
            📍 ${d.city || "Location on map"}<br>
            ✅ Available to donate
          `);

          markers.push(marker);
          count++;

          // Zoom to first donor
          if (count === 1) {
            map.setView([lat, lon], 13);
          }
        });

        document.getElementById("infoBar").textContent =
          count > 0
            ? `🩸 ${count} active donor(s) found on map`
            : "No donors with GPS found. Register with location enabled.";

      } catch (e) {
        document.getElementById("infoBar").textContent = "❌ Cannot connect to Flask. Is it running on port 5000?";
        console.error(e);
      }
    }

    function locateMe() {
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        map.setView([lat, lon], 13);
        L.circleMarker([lat, lon], {
          radius: 8, fillColor: "#1F4E79", color: "#fff",
          weight: 2, fillOpacity: 1
        }).addTo(map).bindPopup("📍 Your Location").openPopup();

        L.circle([lat, lon], {
          radius: 10000, color: "#1F4E79",
          fillColor: "#1F4E79", fillOpacity: 0.05, dashArray: "6"
        }).addTo(map);
      }, () => alert("Location access denied."));
    }

    // Load on start
    loadDonors();
  </script>

</body>
</html>
