<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Donor Map — RaktSetu</title>
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 520px;
      width: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      z-index: 1;
    }

    .map-controls {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .map-controls .form-group {
      margin-bottom: 0;
      min-width: 180px;
    }

    .legend {
      background: white;
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 16px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .donor-count {
      background: var(--red-light);
      border-left: 4px solid var(--red);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--red-dark);
    }

    .donor-popup {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      min-width: 160px;
    }

    .donor-popup .popup-name {
      font-weight: 700;
      font-size: 15px;
      color: #1F4E79;
      margin-bottom: 6px;
    }

    .donor-popup .popup-blood {
      display: inline-block;
      background: #CC0000;
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .donor-popup .popup-row {
      color: #555;
      margin-bottom: 3px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">🩸 Rakt<span>Setu</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Become Donor</a>
      <a href="emergency.html">Emergency</a>
      <a href="map.html" class="active">Live Map</a>
      <a href="dashboard.html">My Profile</a>
    </nav>
  </div>

  <div class="container">
    <div class="page-title">🗺️ Live Donor Map</div>
    <div class="page-subtitle">See all active verified donors near you in real time.</div>

    <!-- FILTER CONTROLS -->
    <div class="map-controls">
      <div class="form-group">
        <label>Filter by Blood Group</label>
        <select id="filterBlood" onchange="loadDonors()">
          <option value="">All Blood Groups</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="form-group">
        <label>Find My Location</label>
        <button class="btn btn-navy" onclick="locateMe()">📍 Show My Location</button>
      </div>
      <div class="form-group">
        <label>Refresh Map</label>
        <button class="btn btn-outline" onclick="loadDonors()">🔄 Refresh</button>
      </div>
    </div>

    <!-- DONOR COUNT BANNER -->
    <div class="donor-count" id="donorCount">
      Loading donors...
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot" style="background:#CC0000;"></span>
        Active Donor (eligible)
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#1F4E79;"></span>
        Your Location
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#FF8800;"></span>
        Active Donor (ineligible — donated recently)
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/map.js"></script>

</body>
</html>
