<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as Donor — RaktSetu</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">🩸 Rakt<span>Setu</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html" class="active">Become Donor</a>
      <a href="emergency.html">Emergency</a>
      <a href="map.html">Live Map</a>
      <a href="dashboard.html">My Profile</a>
    </nav>
  </div>

  <div class="container" style="max-width: 560px;">
    <div class="page-title">Become a Blood Donor 🩸</div>
    <div class="page-subtitle">Register once. Save lives multiple times.</div>

    <div class="card">
      <div class="alert alert-success" id="successMsg"></div>
      <div class="alert alert-error" id="errorMsg"></div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Mobile Number * (10 digits)</label>
        <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
      </div>

      <div class="form-group">
        <label>Blood Group *</label>
        <select id="blood_group">
          <option value="">-- Select Blood Group --</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="Pune">
        </div>
        <div class="form-group">
          <label>PIN Code *</label>
          <input type="text" id="pincode" placeholder="411001" maxlength="6">
        </div>
      </div>

      <div class="form-group">
        <label>Your Location (for nearby matching)</label>
        <button type="button" class="btn btn-outline" onclick="getLocation()" id="locationBtn">
          📍 Capture My Location
        </button>
        <small id="locationStatus" style="display:block; margin-top:8px; color:var(--gray);">
          Location not captured yet
        </small>
        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">
      </div>

      <button class="btn btn-red btn-full" onclick="registerDonor()" id="submitBtn">
        Register as Donor
      </button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/register.js"></script>
</body>
</html>
